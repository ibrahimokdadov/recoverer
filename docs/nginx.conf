server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Legacy XSS filter (belt-and-suspenders with CSP)
    add_header X-XSS-Protection "1; mode=block" always;

    # Don't leak referrer to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable sensitive browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # Content Security Policy
    # - Scripts: only inline (our own canvas/scroll code, no CDN scripts)
    # - Styles: inline + Google Fonts CSS
    # - Fonts: Google Fonts gstatic CDN only
    # - Images: self + data URIs (used by CSS noise SVG)
    # - No frames, no form submissions to third parties, no object embeds
    add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; media-src 'none';" always;

    # HSTS — tell browsers to always use HTTPS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent browsers from caching sensitive pages
    add_header Cache-Control "public, max-age=3600" always;

    # ── Routes ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets (gif, images)
    location ~* \.(gif|png|jpg|jpeg|svg|ico|webp|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        # Re-add security headers (nginx child locations don't inherit add_header)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Deny hidden files (e.g. .htaccess, .git)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Deny direct access to config/build files
    location ~* \.(conf|dockerfile|md|toml|lock)$ {
        deny all;
        return 404;
    }
}
