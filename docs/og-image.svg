    <rect x="820" y="80"  width="10" height="10" rx="2" fill="#E8900A"/>
    <rect x="838" y="80"  width="10" height="10" rx="2" fill="#E8900A"/>
    <rect x="856" y="80"  width="10" height="10" rx="2" fill="#2DBF6E"/>
