        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="108" font-weight="900"
        letter-spacing="-3"
        fill="#DDE2EC">RECOVER</text>
  <text x="80" y="300"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="108" font-weight="900"
        letter-spacing="-3"
        fill="#E8900A"
        transform="translate(648,0)">ER</text>

