    <rect x="1126" y="98" width="10" height="10" rx="2" fill="#1A2030"/>
    <rect x="1144" y="98" width="10" height="10" rx="2" fill="#E8900A"/>
    <rect x="1162" y="98" width="10" height="10" rx="2" fill="#2DBF6E"/>
    <!-- Rows 3–8 (lighter, fade toward bottom) -->
    <rect x="820" y="116" width="10" height="10" rx="2" fill="#E8900A"/>
    <rect x="856" y="116" width="10" height="10" rx="2" fill="#1A2030"/>
    <rect x="892" y="116" width="10" height="10" rx="2" fill="#2DBF6E"/>
