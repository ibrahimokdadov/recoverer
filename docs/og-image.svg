  <rect x="202" y="418" width="88" height="30" rx="15" fill="#E8900A" opacity="0.12"/>
  <text x="246" y="438" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="13" fill="#E8900A">Rust engine</text>

  <rect x="302" y="418" width="106" height="30" rx="15" fill="#2DBF6E" opacity="0.12"/>
  <text x="355" y="438" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="13" fill="#2DBF6E">Open source</text>

  <rect x="420" y="418" width="92" height="30" rx="15" fill="#E8900A" opacity="0.12"/>
  <text x="466" y="438" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="13" fill="#E8900A">WinUI 3</text>

  <!-- Domain badge -->
  <rect x="80" y="540" width="240" height="34" rx="6" fill="#E8900A" opacity="0.1"/>
  <rect x="80" y="540" width="240" height="34" rx="6" fill="none" stroke="#E8900A" stroke-width="1" opacity="0.25"/>
  <text x="200" y="563" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15"
        fill="#E8900A">recoverer.whhite.com</text>
