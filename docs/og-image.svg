    <rect x="1126" y="80" width="10" height="10" rx="2" fill="#2DBF6E"/>
    <rect x="1144" y="80" width="10" height="10" rx="2" fill="#1A2030"/>
    <rect x="1162" y="80" width="10" height="10" rx="2" fill="#E8900A"/>
    <!-- Row 2 -->
    <rect x="820" y="98"  width="10" height="10" rx="2" fill="#1A2030"/>
    <rect x="838" y="98"  width="10" height="10" rx="2" fill="#2DBF6E"/>
    <rect x="856" y="98"  width="10" height="10" rx="2" fill="#E8900A"/>
