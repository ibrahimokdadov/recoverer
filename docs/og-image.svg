<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080A"/>
      <stop offset="100%" style="stop-color:#0D1420"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2030" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8900A;stop-opacity:0.4"/>
      <stop offset="60%" style="stop-color:#E8900A;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#E8900A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Ambient glow top-left -->
  <ellipse cx="200" cy="200" rx="400" ry="240" fill="#E8900A" opacity="0.04"/>

  <!-- Accent bar left edge -->
  <rect x="0" y="0" width="6" height="630" fill="#E8900A"/>

  <!-- Sector dots — decorative, suggests disk scanning -->
  <g opacity="0.18">
